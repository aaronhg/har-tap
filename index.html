<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>HAR Tap — viewer</title>
<meta name="description" content="Zero-install, table-first HAR file viewer: filter, sort, inspect and export HTTP Archive captures. Parsed entirely in your browser — nothing is uploaded.">
<meta property="og:title" content="HAR Tap — HAR viewer">
<meta property="og:description" content="Zero-install, table-first HAR viewer: filter, sort, inspect and export. Nothing is uploaded.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://aaronhg.github.io/har-tap/">
<meta property="og:image" content="https://aaronhg.github.io/har-tap/docs/viewer.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="stylesheet" href="viewer/viewer.css">
</head>
<body>
  <header class="bar">
    <div class="brand">
      <h1>HAR Tap</h1>
      <span class="subtitle">viewer</span>
    </div>
    <button id="open" class="pill">Open .har</button>
    <input id="file" type="file" accept=".har,application/json" hidden>
    <input id="q" class="search" type="search" placeholder="Filter by URL" spellcheck="false" autocomplete="off">
    <div id="chips" class="chips"></div>
    <select id="page" hidden title="Page (one per top-frame navigation)"></select>
    <select id="status" title="Status">
      <option value="all">All status</option>
      <option value="2">2xx</option>
      <option value="3">3xx</option>
      <option value="4">4xx</option>
      <option value="5">5xx</option>
      <option value="err">Errors only</option>
    </select>
    <select id="method" title="Method">
      <option value="all">All methods</option>
    </select>
    <button id="reset" class="pill ghost" title="Clear all filters">Clear filters</button>
    <a class="gh-link" href="https://github.com/aaronhg/har-tap" target="_blank" rel="noopener" title="Source, extension & issues on GitHub" aria-label="GitHub"><svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a>
  </header>

  <main id="main" hidden>
    <section id="table-pane" tabindex="0">
      <table id="grid">
        <colgroup></colgroup>
        <thead></thead><!-- built by renderHeader(): right-click to choose columns -->
        <tbody id="rows"></tbody>
      </table>
      <div id="no-match" hidden>No requests match the filters.</div>
    </section>

    <div id="splitter" hidden title="Drag to resize"></div>
    <aside id="detail" hidden tabindex="-1">
      <div class="detail-head">
        <div class="detail-url"><b id="d-method"></b> <span id="d-url"></span></div>
        <button id="copy-url" class="pill small" title="Copy request URL">Copy URL</button>
        <button id="close" class="icon-btn" title="Close">✕</button>
      </div>
      <nav class="tabs" id="tabs">
        <button data-tab="headers" class="on">Headers</button>
        <button data-tab="payload">Payload</button>
        <button data-tab="preview">Preview</button>
        <button data-tab="response">Response</button>
        <button data-tab="timing">Timing</button>
        <button id="dl" class="tabs-dl" hidden title="Download the response body">Download</button>
      </nav>
      <div id="tab-body"></div>
    </aside>
  </main>

  <div id="empty">
    <div class="empty-card">
      <div class="empty-title">Drop a .har file anywhere</div>
      <button id="open2" class="pill primary">Open .har</button>
      <p class="empty-hint">Parsed in this page — nothing is uploaded.</p>
      <p class="empty-hint">Or record a tab with the <a href="https://github.com/aaronhg/har-tap" target="_blank" rel="noopener">HAR Tap extension</a> and click <b>View</b>.</p>
      <p class="empty-hint" id="example"><a href="?har=test/fixtures/sample.har">…or load the example capture</a></p>
      <p class="empty-err" id="load-err" hidden></p>
    </div>
  </div>

  <footer id="stats" hidden>
    <div id="stats-line"></div>
    <button id="export" class="pill small" title="Export the filtered rows — visible columns only — as CSV">Export CSV</button>
  </footer>
  <div id="drop-overlay" hidden><span>Drop to open</span></div>
  <div id="toast" hidden></div>

  <!-- classic scripts (not modules): Chrome blocks ES-module imports from file://, and opening
       this page straight from disk is supported. lib.js (pure helpers) must load first. -->
  <script src="viewer/lib.js"></script>
  <script src="viewer/viewer.js"></script>
</body>
</html>
